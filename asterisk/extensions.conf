; === Kimenő hívások: minden appnak saját upstream trunk ===

[from-app-1]
exten => _[+0-9].,1,Dial(PJSIP/${EXTEN}@us-1)
 same => n,Hangup()

[from-app-2]
exten => _[+0-9].,1,Dial(PJSIP/${EXTEN}@us-2)
 same => n,Hangup()

[from-app-3]
exten => _[+0-9].,1,Dial(PJSIP/${EXTEN}@us-3)
 same => n,Hangup()

[from-app-4]
exten => _[+0-9].,1,Dial(PJSIP/${EXTEN}@us-4)
 same => n,Hangup()

[from-app-5]
exten => _[+0-9].,1,Dial(PJSIP/${EXTEN}@us-5)
 same => n,Hangup()

; === Bejövő hívások: upstream → megfelelő app ===

[from-upstream]
exten => 92400004,1,Gosub(ring-app,s,1(app1))
 same => n,Hangup()

; Új számok hozzáadásakor:
;exten => SZAM2,1,Gosub(ring-app,s,1(app2))
; same => n,Hangup()
;exten => SZAM3,1,Gosub(ring-app,s,1(app3))
; same => n,Hangup()

exten => s,1,Goto(92400004,1)

; === Közös hívás + push logika ===

[ring-app]
; ARG1 = app endpoint neve (pl. app1, app2 ...)
exten => s,1,NoOp(Bejövő hívás: ${ARG1} <- ${CALLERID(num)})
 same => n,GotoIf($["${PJSIP_AOR(${ARG1},contact)}" = ""]?push,1)
 same => n,Dial(PJSIP/${ARG1},30)
 same => n,Return()

exten => push,1,NoOp(Push küldés: ${ARG1})
 same => n,System(/opt/sip-push/send_push.py "${CALLERID(name)}" "${CALLERID(num)}" "${ARG1}")
 same => n,Wait(15)
 same => n,Dial(PJSIP/${ARG1},20)
 same => n,Return()
