; === Transportok ===

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; === Upstream trunk (valódi Asterisk szerver) ===

[upstream-auth]
type=auth
auth_type=userpass
username=92400004
password=Oob8aiRaht1e

[upstream-aor]
type=aor
contact=sip:92400004@193.131.100.41:5060

[upstream]
type=endpoint
transport=transport-udp
context=from-upstream
disallow=all
allow=ulaw
allow=alaw
allow=g722
outbound_auth=upstream-auth
aors=upstream-aor
from_user=92400004
from_domain=193.131.100.41

[upstream-reg]
type=registration
outbound_auth=upstream-auth
server_uri=sip:193.131.100.41
client_uri=sip:92400004@193.131.100.41
retry_interval=60
contact_user=92400004
expiration=120

; === Helyi extension az appnak ===

[app-auth]
type=auth
auth_type=userpass
username=app
password=app1234

[app]
type=aor
max_contacts=1
remove_existing=yes

[app]
type=endpoint
transport=transport-ws
context=from-app
disallow=all
allow=ulaw
allow=alaw
allow=g722
auth=app-auth
aors=app
webrtc=yes
dtls_cert_file=/etc/asterisk/keys/asterisk.crt
dtls_private_key=/etc/asterisk/keys/asterisk.key
dtls_verify=fingerprint
dtls_setup=actpass
direct_media=no
rtp_symmetric=yes

[upstream-identify]
type=identify
endpoint=upstream
match=193.131.100.41
