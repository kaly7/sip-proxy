; === Transportok ===

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; === Sablonok ===

[upstream-tpl](!)
type=endpoint
transport=transport-udp
context=from-upstream
disallow=all
allow=ulaw
allow=alaw
allow=g722

[app-tpl](!)
type=endpoint
transport=transport-ws
disallow=all
allow=ulaw
allow=alaw
allow=g722
webrtc=yes
dtls_cert_file=/etc/asterisk/keys/asterisk.crt
dtls_private_key=/etc/asterisk/keys/asterisk.key
dtls_verify=fingerprint
dtls_setup=actpass
direct_media=no
rtp_symmetric=yes

; === Bejövő upstream forgalom (minden 193.131.100.41-ről jövő hívás) ===

[upstream-in]
type=endpoint
transport=transport-udp
context=from-upstream
disallow=all
allow=ulaw
allow=alaw
allow=g722

[upstream-identify]
type=identify
endpoint=upstream-in
match=193.131.100.41

; ===========================================================================
; === 1. szám: 92400004 → app1 ===
; ===========================================================================

[us-auth-1]
type=auth
auth_type=userpass
username=92400004
password=Oob8aiRaht1e

[us-aor-1]
type=aor
contact=sip:92400004@193.131.100.41:5060

[us-1](upstream-tpl)
outbound_auth=us-auth-1
aors=us-aor-1
from_user=92400004
from_domain=193.131.100.41

[us-reg-1]
type=registration
outbound_auth=us-auth-1
server_uri=sip:193.131.100.41
client_uri=sip:92400004@193.131.100.41
retry_interval=60
contact_user=92400004
expiration=120

[app-auth-1]
type=auth
auth_type=userpass
username=app1
password=app1234

[app1]
type=aor
max_contacts=1
remove_existing=yes

[app1](app-tpl)
context=from-app-1
auth=app-auth-1
aors=app1

